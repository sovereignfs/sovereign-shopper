<svg viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    .surface { fill:#ffffff }
    .raised { fill:#fafafa }
    .sunken { fill:#f2f2f2 }
    .border { stroke:#e2e2e2; stroke-width:1 }
    .border-strong { stroke:#c9c9c9; stroke-width:1 }
    .primary { fill:#1a1a1a }
    .muted { fill:#6b6b6b }
    .subtle { fill:#9a9a9a }
    .caption { font-size:10px; letter-spacing:.06em; }
    .body { font-size:14px; }
  </style>

  <rect width="375" height="812" class="surface"/>
  <text x="12" y="806" class="subtle" font-size="10">Mobile ≤768px — list view, touch targets ≥44px</text>

  <!-- top bar -->
  <rect x="0" y="0" width="375" height="56" class="raised"/>
  <line x1="0" y1="56" x2="375" y2="56" class="border"/>
  <text x="16" y="34" class="primary body" font-weight="600">‹</text>
  <text x="187" y="34" text-anchor="middle" class="primary body" font-weight="700">Weekly groceries</text>
  <text x="356" y="34" text-anchor="end" class="muted body">⋯</text>

  <!-- add item bar -->
  <rect x="12" y="68" width="351" height="44" rx="10" class="border-strong" fill="#ffffff"/>
  <text x="28" y="95" class="muted body">Add an item…</text>

  <!-- category: Produce -->
  <text x="16" y="136" class="subtle caption" font-weight="600">PRODUCE</text>
  <line x1="16" y1="146" x2="359" y2="146" class="border"/>

  <rect x="16" y="146" width="16" height="16" rx="4" class="border-strong" fill="none" transform="translate(0,16)"/>
  <text x="48" y="178" font-size="15">🍌</text>
  <text x="72" y="178" class="primary body">Bananas</text>
  <rect x="264" y="164" width="90" height="28" rx="14" class="sunken"/>
  <text x="309" y="182" text-anchor="middle" class="muted" font-size="12">− 6 pcs +</text>

  <line x1="16" y1="202" x2="359" y2="202" class="border"/>
  <rect x="16" y="202" width="16" height="16" rx="4" class="border-strong" fill="none" transform="translate(0,16)"/>
  <text x="48" y="234" font-size="15">🥬</text>
  <text x="72" y="234" class="primary body">Spinach</text>
  <rect x="264" y="220" width="90" height="28" rx="14" class="sunken"/>
  <text x="309" y="238" text-anchor="middle" class="muted" font-size="12">− 1 bag +</text>

  <!-- category: Dairy -->
  <text x="16" y="282" class="subtle caption" font-weight="600">DAIRY &amp; EGGS</text>
  <line x1="16" y1="292" x2="359" y2="292" class="border"/>
  <rect x="16" y="292" width="16" height="16" rx="4" class="border-strong" fill="none" transform="translate(0,16)"/>
  <text x="48" y="324" font-size="15">🥛</text>
  <text x="72" y="324" class="primary body">Milk</text>
  <rect x="264" y="310" width="90" height="28" rx="14" class="sunken"/>
  <text x="309" y="328" text-anchor="middle" class="muted" font-size="12">− 1 L +</text>

  <line x1="16" y1="348" x2="359" y2="348" class="border"/>
  <rect x="16" y="348" width="16" height="16" rx="4" class="border-strong" fill="none" transform="translate(0,16)"/>
  <text x="48" y="380" font-size="15">🥚</text>
  <text x="72" y="380" class="primary body">Eggs</text>
  <rect x="264" y="366" width="90" height="28" rx="14" class="sunken"/>
  <text x="309" y="384" text-anchor="middle" class="muted" font-size="12">− 12 pcs +</text>

  <!-- bought collapsed -->
  <rect x="12" y="420" width="351" height="40" rx="8" class="raised"/>
  <text x="28" y="445" class="muted body" font-weight="600">▸ Bought (2)</text>

  <!-- platform mobile nav placeholder (out of scope) -->
  <rect x="0" y="756" width="375" height="56" class="sunken"/>
  <text x="187" y="788" text-anchor="middle" class="subtle" font-size="11">Platform mobile nav — not part of this wireframe</text>
</svg>
