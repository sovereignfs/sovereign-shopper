<svg viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    .surface { fill:#ffffff }
    .raised { fill:#fafafa }
    .sunken { fill:#f2f2f2 }
    .border { stroke:#e2e2e2; stroke-width:1 }
    .border-strong { stroke:#c9c9c9; stroke-width:1 }
    .primary { fill:#1a1a1a }
    .muted { fill:#6b6b6b }
    .subtle { fill:#9a9a9a }
    .info-surface { fill:#eef4fb }
    .info-border { stroke:#bcd6ef; stroke-width:1 }
    .info-text { fill:#2b5a8a }
    .caption { font-size:10px; letter-spacing:.06em; }
    .body { font-size:14px; }
  </style>

  <rect width="375" height="812" class="surface"/>
  <text x="12" y="806" class="subtle" font-size="10">Mobile ≤768px — combined view, reflow of screen 3</text>

  <!-- top bar -->
  <rect x="0" y="0" width="375" height="56" class="raised"/>
  <line x1="0" y1="56" x2="375" y2="56" class="border"/>
  <text x="16" y="34" class="primary body" font-weight="600">‹</text>
  <text x="187" y="34" text-anchor="middle" class="primary body" font-weight="700">All lists</text>

  <!-- info banner -->
  <rect x="12" y="68" width="351" height="52" rx="8" class="info-surface"/>
  <rect x="12" y="68" width="351" height="52" rx="8" fill="none" class="info-border"/>
  <text x="28" y="90" class="info-text" font-size="12">Read-only — check items off</text>
  <text x="28" y="106" class="info-text" font-size="12">from their own list.</text>

  <text x="16" y="144" class="subtle caption" font-weight="600">PRODUCE</text>
  <line x1="16" y1="154" x2="359" y2="154" class="border"/>
  <rect x="16" y="154" width="16" height="16" rx="4" class="border-strong" fill="#f2f2f2" transform="translate(0,16)"/>
  <text x="48" y="186" font-size="15">🍌</text>
  <text x="72" y="186" class="primary body">Bananas</text>
  <rect x="230" y="172" width="118" height="24" rx="12" class="sunken"/>
  <text x="289" y="188" text-anchor="middle" class="muted" font-size="10">Weekly groceries</text>

  <line x1="16" y1="212" x2="359" y2="212" class="border"/>
  <rect x="16" y="212" width="16" height="16" rx="4" class="border-strong" fill="#f2f2f2" transform="translate(0,16)"/>
  <text x="48" y="244" font-size="15">🍎</text>
  <text x="72" y="244" class="primary body">Apples</text>
  <rect x="260" y="230" width="88" height="24" rx="12" class="sunken"/>
  <text x="304" y="246" text-anchor="middle" class="muted" font-size="10">Costco run</text>

  <text x="16" y="292" class="subtle caption" font-weight="600">CAMPING</text>
  <line x1="16" y1="302" x2="359" y2="302" class="border"/>
  <rect x="16" y="302" width="16" height="16" rx="4" class="border-strong" fill="#f2f2f2" transform="translate(0,16)"/>
  <text x="48" y="334" font-size="15">🔥</text>
  <text x="72" y="334" class="primary body">Firewood</text>
  <rect x="240" y="320" width="108" height="24" rx="12" class="sunken"/>
  <text x="294" y="336" text-anchor="middle" class="muted" font-size="10">Camping trip</text>

  <!-- platform mobile nav placeholder (out of scope) -->
  <rect x="0" y="756" width="375" height="56" class="sunken"/>
  <text x="187" y="788" text-anchor="middle" class="subtle" font-size="11">Platform mobile nav — not part of this wireframe</text>
</svg>
