<svg viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    .surface { fill:#ffffff }
    .raised { fill:#fafafa }
    .sunken { fill:#f2f2f2 }
    .border { stroke:#e2e2e2; stroke-width:1 }
    .border-strong { stroke:#c9c9c9; stroke-width:1 }
    .primary { fill:#1a1a1a }
    .muted { fill:#6b6b6b }
    .subtle { fill:#9a9a9a }
    .accent-fill { fill:#111111 }
    .accent-subtle { fill:#eeeeee }
    .on-accent { fill:#ffffff }
    .info-surface { fill:#eef4fb }
    .info-border { stroke:#bcd6ef; stroke-width:1 }
    .info-text { fill:#2b5a8a }
    .caption { font-size:11px; letter-spacing:.06em; }
    .body { font-size:14px; }
  </style>

  <rect width="1280" height="800" class="surface"/>
  <text x="16" y="792" class="subtle body">Screen: Combined view — read-only roll-up across all accessible lists</text>

  <!-- Sidebar -->
  <rect x="0" y="0" width="280" height="800" class="raised"/>
  <line x1="280" y1="0" x2="280" y2="800" class="border"/>
  <text x="24" y="40" class="primary" font-size="17" font-weight="700">Shopper</text>
  <rect x="24" y="60" width="232" height="36" rx="8" class="accent-fill"/>
  <text x="40" y="83" class="on-accent body" font-weight="600">+ New list</text>

  <text x="24" y="128" class="subtle caption" font-weight="600">MY LISTS</text>
  <rect x="16" y="140" width="248" height="40" rx="8" fill="none"/>
  <text x="32" y="165" class="muted body">Weekly groceries</text>
  <rect x="16" y="184" width="248" height="40" rx="8" fill="none"/>
  <text x="32" y="209" class="muted body">Costco run</text>

  <line x1="24" y1="240" x2="256" y2="240" class="border"/>
  <text x="24" y="264" class="subtle caption" font-weight="600">SHARED WITH ME</text>
  <rect x="16" y="276" width="248" height="40" rx="8" fill="none"/>
  <text x="32" y="301" class="muted body">Camping trip</text>

  <line x1="24" y1="332" x2="256" y2="332" class="border"/>
  <rect x="16" y="348" width="248" height="40" rx="8" class="accent-subtle"/>
  <text x="32" y="373" class="primary body" font-weight="600">Combined view</text>

  <!-- Main content -->
  <text x="312" y="52" class="primary" font-size="24" font-weight="700">All lists</text>
  <text x="312" y="76" class="muted body">Everything across your 3 accessible lists</text>

  <rect x="312" y="96" width="936" height="44" rx="8" class="info-surface"/>
  <rect x="312" y="96" width="936" height="44" rx="8" fill="none" class="info-border"/>
  <text x="332" y="123" class="info-text body">Read-only — check items off from their own list to keep this view simple.</text>

  <text x="312" y="176" class="subtle caption" font-weight="600">PRODUCE</text>
  <line x1="312" y1="188" x2="1248" y2="188" class="border"/>
  <rect x="312" y="188" width="16" height="16" rx="4" class="border-strong" fill="#f2f2f2" transform="translate(0,8)"/>
  <text x="344" y="212" font-size="14">🍌</text>
  <text x="368" y="212" class="primary body">Bananas</text>
  <rect x="880" y="196" width="140" height="24" rx="12" class="sunken"/>
  <text x="950" y="213" text-anchor="middle" class="muted" font-size="11">Weekly groceries</text>
  <text x="1160" y="212" text-anchor="end" class="subtle body">6 pcs</text>

  <line x1="312" y1="236" x2="1248" y2="236" class="border"/>
  <rect x="312" y="236" width="16" height="16" rx="4" class="border-strong" fill="#f2f2f2" transform="translate(0,8)"/>
  <text x="344" y="260" font-size="14">🍎</text>
  <text x="368" y="260" class="primary body">Apples</text>
  <rect x="880" y="244" width="100" height="24" rx="12" class="sunken"/>
  <text x="930" y="261" text-anchor="middle" class="muted" font-size="11">Costco run</text>
  <text x="1160" y="260" text-anchor="end" class="subtle body">1 bag</text>

  <text x="312" y="308" class="subtle caption" font-weight="600">CAMPING</text>
  <line x1="312" y1="320" x2="1248" y2="320" class="border"/>
  <rect x="312" y="320" width="16" height="16" rx="4" class="border-strong" fill="#f2f2f2" transform="translate(0,8)"/>
  <text x="344" y="344" font-size="14">🔥</text>
  <text x="368" y="344" class="primary body">Firewood</text>
  <rect x="880" y="328" width="140" height="24" rx="12" class="sunken"/>
  <text x="950" y="345" text-anchor="middle" class="muted" font-size="11">Camping trip</text>
  <text x="1160" y="344" text-anchor="end" class="subtle body">1 bundle</text>
</svg>
