<svg viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    .surface { fill:#ffffff }
    .raised { fill:#fafafa }
    .sunken { fill:#f2f2f2 }
    .border { stroke:#e2e2e2; stroke-width:1 }
    .border-strong { stroke:#c9c9c9; stroke-width:1 }
    .primary { fill:#1a1a1a }
    .muted { fill:#6b6b6b }
    .subtle { fill:#9a9a9a }
    .accent-fill { fill:#111111 }
    .on-accent { fill:#ffffff }
    .scrim { fill:#111111; fill-opacity:0.35 }
    .caption { font-size:11px; letter-spacing:.06em; }
    .body { font-size:14px; }
  </style>

  <rect width="1280" height="800" class="surface"/>
  <text x="16" y="792" class="subtle body">Screen: Share dialog — Dialog component with scrim, centered</text>

  <!-- dimmed background -->
  <rect x="0" y="0" width="280" height="800" class="raised"/>
  <line x1="280" y1="0" x2="280" y2="800" class="border"/>
  <text x="24" y="40" class="primary" font-size="17" font-weight="700">Shopper</text>
  <text x="312" y="52" class="primary" font-size="24" font-weight="700">Weekly groceries</text>
  <rect x="0" y="0" width="1280" height="800" class="scrim"/>

  <!-- Dialog -->
  <rect x="380" y="140" width="520" height="520" rx="16" class="surface"/>
  <rect x="380" y="140" width="520" height="520" rx="16" fill="none" stroke="#c9c9c9" stroke-width="1"/>

  <text x="412" y="184" class="primary" font-size="18" font-weight="700">Share list</text>
  <text x="412" y="206" class="muted body">Weekly groceries</text>
  <text x="868" y="184" text-anchor="end" class="muted body" font-size="16">✕</text>

  <line x1="412" y1="222" x2="868" y2="222" class="border"/>

  <!-- search -->
  <rect x="412" y="244" width="456" height="40" rx="8" class="border-strong" fill="#ffffff"/>
  <text x="428" y="269" class="muted body">Search people by name or email…</text>

  <!-- matched result -->
  <circle cx="432" cy="316" r="16" class="sunken"/>
  <text x="432" y="321" text-anchor="middle" class="muted" font-size="11">JR</text>
  <text x="460" y="313" class="primary body">Jordan Reyes</text>
  <text x="460" y="330" class="subtle" font-size="12">jordan@example.com</text>
  <rect x="784" y="302" width="72" height="28" rx="14" class="border-strong" fill="none"/>
  <text x="820" y="320" text-anchor="middle" class="primary" font-size="12">Add</text>

  <line x1="412" y1="356" x2="868" y2="356" class="border"/>
  <text x="412" y="380" class="subtle caption" font-weight="600">PEOPLE WITH ACCESS</text>

  <circle cx="432" cy="416" r="16" class="sunken"/>
  <text x="432" y="421" text-anchor="middle" class="muted" font-size="11">You</text>
  <text x="460" y="413" class="primary body">You</text>
  <text x="460" y="430" class="subtle" font-size="12">Owner</text>

  <circle cx="432" cy="464" r="16" class="sunken"/>
  <text x="432" y="469" text-anchor="middle" class="muted" font-size="11">AR</text>
  <text x="460" y="461" class="primary body">Alex R.</text>
  <rect x="700" y="450" width="108" height="28" rx="8" class="border-strong" fill="#ffffff"/>
  <text x="716" y="468" class="primary" font-size="12">Can edit ▾</text>
  <text x="842" y="468" class="subtle body">✕</text>

  <circle cx="432" cy="512" r="16" class="sunken"/>
  <text x="432" y="517" text-anchor="middle" class="muted" font-size="11">SM</text>
  <text x="460" y="509" class="primary body">Sam M.</text>
  <rect x="700" y="498" width="108" height="28" rx="8" class="border-strong" fill="#ffffff"/>
  <text x="716" y="516" class="primary" font-size="12">Can view ▾</text>
  <text x="842" y="516" class="subtle body">✕</text>

  <!-- footer -->
  <rect x="748" y="596" width="120" height="40" rx="8" class="accent-fill"/>
  <text x="808" y="621" text-anchor="middle" class="on-accent body" font-weight="600">Done</text>
</svg>
